<section class="innovation-strip" id="today-quest" aria-labelledby="questTitle">
  <div class="container">
    <div class="quest-shell reveal-up">
      <div class="quest-intro">
        <div class="kicker" style="color:#78e1c2">PLAY · CHECK · GROW</div>
        <h2 id="questTitle">오늘의 작은 퀘스트</h2>
        <p>고민을 오래 붙잡기보다 지금 할 수 있는 작은 행동 하나를 뽑아 직접 해봅니다. 완료 기록은 이 기기의 브라우저에만 저장됩니다.</p>
        <div class="quest-formula"><span>확인</span><span>선택</span><span>10분 실천</span><span>결과 기록</span></div>
        <div class="mood-controls" aria-label="홈페이지 분위기 선택">
          <button type="button" data-mood-choice="calm">🌿 차분하게</button>
          <button type="button" data-mood-choice="energy">☀ 활기차게</button>
          <button type="button" data-mood-choice="focus">◆ 집중하게</button>
        </div>
      </div>
      <article class="quest-card" id="questCard" aria-live="polite">
        <div class="quest-top"><span class="quest-tag" id="questTag">생활 · 10분</span><span class="quest-streak" id="questStreak">연속 실천 0일</span></div>
        <h3 id="questText">오늘 가장 눈에 띄는 한 곳을 10분만 정리해 보세요.</h3>
        <p id="questTip">완벽하게 끝내기보다 시작 전과 후의 느낌을 한 문장으로 남겨 보세요.</p>
        <div class="quest-actions"><button class="btn btn-primary" type="button" id="questDraw">새 퀘스트 뽑기</button><button class="btn btn-mint" type="button" id="questComplete">오늘 완료</button><a class="btn btn-light" href="#action-log">7일 기록으로 이동</a></div>
        <div class="quest-dots" id="questDots" aria-label="최근 7일 실천 현황"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </article>
    </div>
  </div>
</section>
